<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第1話「月明かりの工房」 — Viewer</title>

  <!-- Tokens -->
  <link rel="stylesheet" href="css/tokens/color.css">
  <link rel="stylesheet" href="css/tokens/layout.css">
  <link rel="stylesheet" href="css/tokens/typography.css">

  <!-- Components -->
  <link rel="stylesheet" href="css/components/icon.css">
  <link rel="stylesheet" href="css/components/button.css">
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/components/form-textarea.css">
  <link rel="stylesheet" href="css/components/emotion-pick.css">

  <!-- Page -->
  <link rel="stylesheet" href="css/pages/viewer-yoko.css">
  <script src="js/core/_global.js" defer></script>
  <script src="js/components/modal.js" defer></script>
  <script src="js/components/modal-water-thanks.js" defer></script>
  <script src="js/pages/viewer-yoko.js" defer></script>
</head>
<body class="viewer-yoko">

  <!-- 진행 바 — aria-valuenow/valuemin/valuemax 가 단일 소스, JS 가 progress-bar width + 페이지 인디케이터 동기화 -->
  <div class="viewer-yoko__progress" role="progressbar" aria-valuenow="1" aria-valuemin="1" aria-valuemax="6" aria-label="読書進捗">
    <div class="viewer-yoko__progress-bar"></div>
  </div>

  <!-- 헤더: 닫기 + 화 제목 -->
  <header class="viewer-yoko__header">
    <button class="viewer-yoko__close" type="button" aria-label="閉じる" onclick="window.close()">
      <i class="icon icon-chevron-left"></i>
    </button>
    <h1 class="viewer-yoko__title">第1話「月明かりの工房」</h1>
  </header>

  <!-- 메인: 좌(次へ) + 본문 + 우(前へ) — 버튼 disabled 는 JS 가 페이지 상태로 토글 -->
  <main class="viewer-yoko__main">
    <button class="viewer-yoko__nav viewer-yoko__nav--next" type="button" aria-label="次のページ">
      <i class="icon icon-chevron-left"></i>
    </button>
    <div class="viewer-yoko__content" aria-label="ページ内容">
      <div class="viewer-yoko__stage">
        <div class="viewer-yoko__spread">
          <div class="viewer-yoko__image-wrap">
            <img class="viewer-yoko__image" src="img/img_viewer_kurokage_01.jpg" alt="">
          </div>
          <div class="viewer-yoko__image-wrap">
            <img class="viewer-yoko__image" src="img/img_viewer_kurokage_02.jpg" alt="">
          </div>
        </div>
      </div>
    </div>
    <button class="viewer-yoko__nav viewer-yoko__nav--prev" type="button" aria-label="前のページ">
      <i class="icon icon-chevron-right"></i>
    </button>
  </main>

  <!-- 푸터: 次の話 | 페이지 인디케이터 | 前の話 -->
  <footer class="viewer-yoko__footer">
    <div class="viewer-yoko__footer-side">
      <button class="btn btn-ghost btn--sm" type="button">
        <i class="icon icon-chevron-left icon--sm"></i>
        <span>次の話</span>
      </button>
    </div>
    <div class="viewer-yoko__page" aria-label="現在のページ">
      <span class="viewer-yoko__page-current">1</span><span class="viewer-yoko__page-total">/6</span>
    </div>
    <div class="viewer-yoko__footer-side viewer-yoko__footer-side--end">
      <button class="btn btn-ghost btn--sm" type="button">
        <span>前の話</span>
        <i class="icon icon-chevron-right icon--sm"></i>
      </button>
    </div>
  </footer>

  <!-- Modal: 水をあげて応援する — backdrop 1개 안에 modal 박스 2개 (form → thanks 단계 이동) -->
  <div class="modal-backdrop modal-backdrop--multi" id="modal-water-support">
    <div class="modal modal--water-support" role="dialog" aria-modal="true" aria-labelledby="modal-water-support-title" data-step="form">
      <button class="modal__close" type="button" data-modal-close aria-label="閉じる">
        <i class="icon icon-close"></i>
      </button>
      <div class="modal-water-support__head">
        <h2 class="modal__title" id="modal-water-support-title">水をあげて応援する</h2>
        <p class="modal__helper modal-water-support__helper">タグもメッセージも未入力のままでも送信できます。</p>
      </div>
      <div class="modal-water-support__body">
        <div class="modal-water-support__emotions" role="radiogroup" aria-label="感情を選ぶ">
          <label class="emotion-pick">
            <input type="radio" name="water-emotion" value="laugh" class="emotion-pick__input" checked data-water-emotion-default>
            <i class="icon icon-sentiment-very-satisfied-filled emotion-pick__icon"></i>
            <span class="emotion-pick__label text-caption-w4">笑った</span>
          </label>
          <label class="emotion-pick">
            <input type="radio" name="water-emotion" value="cry" class="emotion-pick__input">
            <i class="icon icon-sentiment-sad-filled emotion-pick__icon"></i>
            <span class="emotion-pick__label text-caption-w4">泣けた</span>
          </label>
          <label class="emotion-pick">
            <input type="radio" name="water-emotion" value="love" class="emotion-pick__input">
            <i class="icon icon-favorite-filled emotion-pick__icon"></i>
            <span class="emotion-pick__label text-caption-w4">推せる</span>
          </label>
          <label class="emotion-pick">
            <input type="radio" name="water-emotion" value="next" class="emotion-pick__input">
            <i class="icon icon-fast-forward-filled emotion-pick__icon"></i>
            <span class="emotion-pick__label text-caption-w4">続き楽しみ</span>
          </label>
        </div>
        <div class="form-textarea form-textarea--with-counter modal-water-support__textarea">
          <textarea class="form-textarea__field" rows="5" maxlength="300" placeholder="応援メッセージを入力せずに水やりをすると、&#10;ランダムメッセージが届きます。" aria-label="作品へのひとこと"></textarea>
          <span class="form-textarea__counter text-overline-w4" data-textarea-counter>0/300</span>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn-line btn--sm" type="button" data-modal-close><span class="text-caption-w4">次の話を読む</span></button>
        <button class="btn btn-filled-sky btn--sm" type="button" disabled data-water-submit><span class="text-caption-w4">水をあげて応援する</span></button>
      </div>
    </div>

    <!-- Step 2: 감사 화면 — 동일 backdrop 안 두번째 modal. 모달 vertical 50% 위치에 SVG 이미지 + overflow 마스크 -->
    <div class="modal modal--inactive modal--water-thanks" role="dialog" aria-modal="true" data-step="thanks">
      <button class="modal__close" type="button" data-modal-close aria-label="閉じる">
        <i class="icon icon-close"></i>
      </button>
      <img class="modal-water-thanks__image" src="img/img_water_thanks.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__illust" src="img/img_illust_183.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__illust-overlay" src="img/img_illust_185.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <p class="modal-water-thanks__title">花壇に水を届けています</p>
    </div>
  </div>

  <script>
    // 감정 라디오 + textarea 카운터 + 송신 버튼 활성화 (series-home.html 동일 로직)
    (() => {
      const backdrop = document.getElementById('modal-water-support');
      if (!backdrop) return;

      const submit = backdrop.querySelector('[data-water-submit]');
      const radios = backdrop.querySelectorAll('input[name="water-emotion"]');
      const ta = backdrop.querySelector('.form-textarea__field');
      const counter = backdrop.querySelector('[data-textarea-counter]');

      const update = () => {
        const anyPicked = Array.from(radios).some((r) => r.checked);
        const hasText = ta && ta.value.trim().length > 0;
        if (submit) submit.disabled = !(anyPicked || hasText);
      };

      radios.forEach((r) => r.addEventListener('change', update));

      // 모달 오픈 직전에 form/thanks step 1 로 리셋. 시퀀스/비주얼 초기화는 WaterThanks 담당.
      function resetSteps() {
        if (window.WaterThanks) WaterThanks.reset(backdrop);
        const formModal = backdrop.querySelector('[data-step="form"]');
        const thanksModal = backdrop.querySelector('[data-step="thanks"]');
        if (formModal) formModal.classList.remove('modal--inactive');
        if (thanksModal) {
          thanksModal.classList.add('modal--inactive');
          if (formModal) thanksModal.style.height = formModal.offsetHeight + 'px';
        }
      }
      document.addEventListener('click', (e) => {
        const opener = e.target.closest('[data-modal-open="#modal-water-support"]');
        if (!opener) return;
        const def = backdrop.querySelector('[data-water-emotion-default]');
        if (def) def.checked = true;
        resetSteps();
        update();
      });

      if (ta && counter) {
        const max = ta.getAttribute('maxlength') || 300;
        const tick = () => {
          counter.textContent = `${ta.value.length}/${max}`;
          update();
        };
        ta.addEventListener('input', tick);
        tick();
      }

      // viewer-yoko 의 마지막 장 next 가 JS 에서 직접 호출 — 기본 라디오 복원 + step 리셋
      window.addEventListener('viewer-yoko:open-water-support', () => {
        const def = backdrop.querySelector('[data-water-emotion-default]');
        if (def) def.checked = true;
        resetSteps();
        update();
      });
      // 「水をあげて応援する」 클릭 → 같은 backdrop 안에서 form → thanks modal 박스만 swap (시퀀스는 WaterThanks 담당)
      if (submit) {
        submit.addEventListener('click', () => {
          if (submit.disabled) return;
          const formModal   = backdrop.querySelector('[data-step="form"]');
          const thanksModal = backdrop.querySelector('[data-step="thanks"]');
          if (!formModal || !thanksModal) return;
          formModal.classList.add('modal--inactive');
          formModal.addEventListener('transitionend', function onClose(e) {
            if (e.propertyName !== 'opacity' && e.propertyName !== 'transform') return;
            formModal.removeEventListener('transitionend', onClose);
            if (window.WaterThanks) WaterThanks.start(thanksModal);
            thanksModal.classList.remove('modal--inactive');
          });
        });
      }
    })();
  </script>

</body>
</html>
