<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第1話「月明かりの工房」 — Viewer (コマ)</title>

  <!-- Tokens -->
  <link rel="stylesheet" href="css/tokens/color.css">
  <link rel="stylesheet" href="css/tokens/layout.css">
  <link rel="stylesheet" href="css/tokens/typography.css">

  <!-- Components -->
  <link rel="stylesheet" href="css/components/icon.css">
  <link rel="stylesheet" href="css/components/button.css">
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/components/form-textarea.css">
  <link rel="stylesheet" href="css/components/emotion-pick.css">

  <!-- Page -->
  <link rel="stylesheet" href="css/pages/viewer-koma.css">
  <script src="js/core/_global.js" defer></script>
  <script src="js/components/modal.js" defer></script>
  <script src="js/pages/viewer-koma.js" defer></script>
</head>
<body class="viewer-koma">

  <!-- 진행 바 -->
  <div class="viewer-koma__progress" role="progressbar" aria-valuenow="1" aria-valuemin="1" aria-valuemax="6" aria-label="読書進捗">
    <div class="viewer-koma__progress-bar"></div>
  </div>

  <!-- 헤더: 닫기 + 화 제목 -->
  <header class="viewer-koma__header">
    <button class="viewer-koma__close" type="button" aria-label="閉じる" onclick="window.close()">
      <i class="icon icon-chevron-left"></i>
    </button>
    <h1 class="viewer-koma__title">第1話「月明かりの工房」</h1>
  </header>

  <!-- 메인: 단일 stage 안에 [nav-prev | 카드 | nav-next] 횡 정렬 + dots/caption 세로 -->
  <main class="viewer-koma__main" aria-label="ページ内容">
    <div class="viewer-koma__stage">
      <div class="viewer-koma__card-row">
        <button class="viewer-koma__nav viewer-koma__nav--prev" type="button" aria-label="前のコマ" disabled>
          <i class="icon icon-chevron-left"></i>
        </button>
        <article class="viewer-koma__card" data-koma="1">
          <div class="viewer-koma__card-track">
            <img class="viewer-koma__card-image" src="img/img_viewer_koma_01.png" alt="コマ 1">
          </div>
        </article>
        <button class="viewer-koma__nav viewer-koma__nav--next" type="button" aria-label="次のコマ">
          <i class="icon icon-chevron-right"></i>
        </button>
      </div>

      <!-- Dots indicator + 안내 캡션 — 카드 바로 하단 (한 그룹, gap 12) -->
      <div class="viewer-koma__bottom">
      <div class="viewer-koma__indicator" role="tablist" aria-label="コマインジケーター">
        <button class="viewer-koma__dot is-active" type="button" role="tab" aria-selected="true"  aria-label="1コマ目"></button>
        <button class="viewer-koma__dot"           type="button" role="tab" aria-selected="false" aria-label="2コマ目"></button>
        <button class="viewer-koma__dot"           type="button" role="tab" aria-selected="false" aria-label="3コマ目"></button>
        <button class="viewer-koma__dot"           type="button" role="tab" aria-selected="false" aria-label="4コマ目"></button>
        <button class="viewer-koma__dot"           type="button" role="tab" aria-selected="false" aria-label="5コマ目"></button>
        <button class="viewer-koma__dot"           type="button" role="tab" aria-selected="false" aria-label="6コマ目"></button>
      </div>
      <p class="viewer-koma__caption">左から右へ、カルーセルを送って読んでいく想定です。</p>
      </div>
    </div>
  </main>

  <!-- 푸터: 次の話 | 페이지 인디케이터 | 前の話 -->
  <footer class="viewer-koma__footer">
    <div class="viewer-koma__footer-side">
      <button class="btn btn-ghost btn--sm" type="button">
        <i class="icon icon-chevron-left icon--sm"></i>
        <span>前の話</span>
      </button>
    </div>
    <div class="viewer-koma__page" aria-label="現在のコマ">
      <span class="viewer-koma__page-current">1</span><span class="viewer-koma__page-total">/6</span>
    </div>
    <div class="viewer-koma__footer-side viewer-koma__footer-side--end">
      <button class="btn btn-ghost btn--sm" type="button">
        <span>次の話</span>
        <i class="icon icon-chevron-right icon--sm"></i>
      </button>
    </div>
  </footer>

  <!-- Modal: 水をあげて応援する — backdrop 1개 안에 modal 박스 2개 (form → thanks 단계 이동) -->
  <div class="modal-backdrop modal-backdrop--multi" id="modal-water-support">
    <div class="modal modal--water-support" role="dialog" aria-modal="true" aria-labelledby="modal-water-support-title" data-step="form">
      <button class="modal__close" type="button" data-modal-close aria-label="閉じる">
        <i class="icon icon-close"></i>
      </button>
      <div class="modal-water-support__head">
        <h2 class="modal__title" id="modal-water-support-title">水をあげて応援する</h2>
        <p class="modal__helper modal-water-support__helper">タグもメッセージも未入力のままでも送信できます。</p>
      </div>
      <div class="modal-water-support__body">
        <div class="modal-water-support__emotions" role="radiogroup" aria-label="感情を選ぶ">
          <label class="emotion-pick">
            <input type="radio" name="water-emotion" value="laugh" class="emotion-pick__input" checked data-water-emotion-default>
            <i class="icon icon-sentiment-very-satisfied-filled emotion-pick__icon"></i>
            <span class="emotion-pick__label text-caption-w4">笑った</span>
          </label>
          <label class="emotion-pick">
            <input type="radio" name="water-emotion" value="cry" class="emotion-pick__input">
            <i class="icon icon-sentiment-sad-filled emotion-pick__icon"></i>
            <span class="emotion-pick__label text-caption-w4">泣けた</span>
          </label>
          <label class="emotion-pick">
            <input type="radio" name="water-emotion" value="love" class="emotion-pick__input">
            <i class="icon icon-favorite-filled emotion-pick__icon"></i>
            <span class="emotion-pick__label text-caption-w4">推せる</span>
          </label>
          <label class="emotion-pick">
            <input type="radio" name="water-emotion" value="next" class="emotion-pick__input">
            <i class="icon icon-fast-forward-filled emotion-pick__icon"></i>
            <span class="emotion-pick__label text-caption-w4">続き楽しみ</span>
          </label>
        </div>
        <div class="form-textarea form-textarea--with-counter modal-water-support__textarea">
          <textarea class="form-textarea__field" rows="5" maxlength="300" placeholder="応援メッセージを入力せずに水やりをすると、&#10;ランダムメッセージが届きます。" aria-label="作品へのひとこと"></textarea>
          <span class="form-textarea__counter text-overline-w4" data-textarea-counter>0/300</span>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn-line btn--sm" type="button" data-modal-close><span class="text-caption-w4">次の話を読む</span></button>
        <button class="btn btn-filled-sky btn--sm" type="button" disabled data-water-submit><span class="text-caption-w4">水をあげて応援する</span></button>
      </div>
    </div>

    <!-- Step 2: 감사 화면 — 동일 backdrop 안 두번째 modal. 모달 vertical 50% 위치에 SVG 이미지 + overflow 마스크 -->
    <div class="modal modal--inactive modal--water-thanks" role="dialog" aria-modal="true" data-step="thanks">
      <button class="modal__close" type="button" data-modal-close aria-label="閉じる">
        <i class="icon icon-close"></i>
      </button>
      <img class="modal-water-thanks__image" src="img/img_water_thanks.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__illust" src="img/img_illust_183.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__illust-overlay" src="img/img_illust_185.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <img class="modal-water-thanks__drop modal-water-thanks__drop--ground" src="img/img_water_drop_176.svg" alt="" aria-hidden="true">
      <p class="modal-water-thanks__title">花壇に水を届けています</p>
    </div>
  </div>

  <script>
    // 감정 라디오 + textarea 카운터 + 송신 버튼 활성화 (viewer-yoko 동일 로직)
    (() => {
      const backdrop = document.getElementById('modal-water-support');
      if (!backdrop) return;

      const submit = backdrop.querySelector('[data-water-submit]');
      const radios = backdrop.querySelectorAll('input[name="water-emotion"]');
      const ta = backdrop.querySelector('.form-textarea__field');
      const counter = backdrop.querySelector('[data-textarea-counter]');

      const update = () => {
        const anyPicked = Array.from(radios).some((r) => r.checked);
        const hasText = ta && ta.value.trim().length > 0;
        if (submit) submit.disabled = !(anyPicked || hasText);
      };

      radios.forEach((r) => r.addEventListener('change', update));

      // 모달 오픈 직전에 기본 선택(笑った) 복원 + form/thanks step 1 로 리셋
      function resetSteps() {
        dropCycleCancels.forEach((c) => c()); dropCycleCancels = [];
        const illustReset = backdrop.querySelector(".modal-water-thanks__illust");
        if (illustReset) illustReset.src = "img/img_illust_183.svg"; // 새싹 일러스트 원본 복귀
        const overlayReset = backdrop.querySelector(".modal-water-thanks__illust-overlay");
        if (overlayReset) overlayReset.classList.remove("modal-water-thanks__illust-overlay--visible");
        const titleReset = backdrop.querySelector(".modal-water-thanks__title");
        if (titleReset) { titleReset.textContent = "花壇に水を届けています"; titleReset.style.animation = "none"; }
        const formModal = backdrop.querySelector('[data-step="form"]');
        const thanksModal = backdrop.querySelector('[data-step="thanks"]');
        if (formModal) formModal.classList.remove('modal--inactive');
        if (thanksModal) {
          thanksModal.classList.add('modal--inactive');
          if (formModal) thanksModal.style.height = formModal.offsetHeight + 'px';
        }
      }
      document.addEventListener('click', (e) => {
        const opener = e.target.closest('[data-modal-open="#modal-water-support"]');
        if (!opener) return;
        const def = backdrop.querySelector('[data-water-emotion-default]');
        if (def) def.checked = true;
        resetSteps();
        update();
      });

      if (ta && counter) {
        const max = ta.getAttribute('maxlength') || 300;
        const tick = () => {
          counter.textContent = `${ta.value.length}/${max}`;
          update();
        };
        ta.addEventListener('input', tick);
        tick();
      }

      // viewer-koma 의 마지막 코마 next 가 JS 에서 직접 호출 — 기본 라디오 복원 + step 리셋
      window.addEventListener('viewer-koma:open-water-support', () => {
        const def = backdrop.querySelector('[data-water-emotion-default]');
        if (def) def.checked = true;
        resetSteps();
        update();
      });
      // 물방울 — drops(식물·땅) 각각 독립 사이클로 반복.
      // plant: 1.5s 주기, 모달 중앙 ±40px / ground: 3s 주기, 가로 전체 랜덤 + Y ±40px
      // 첫 사이클의 stagger 는 setTimeout 이 아닌 inline animation-delay 로 처리 — 안 그러면 CSS 애니메이션이
      // 먼저 시작돼 animationend 리스너 부착 전에 끝나면서 splash 단계를 놓침.
      let dropCycleCancels = [];
      function startDropCycle(thanksModal) {
        dropCycleCancels.forEach((c) => c());
        dropCycleCancels = [];
        const drops = thanksModal.querySelectorAll(".modal-water-thanks__drop");
        const grounds = Array.from(drops).filter((d) => d.classList.contains("modal-water-thanks__drop--ground"));
        const groundCount = grounds.length || 1;
        const PRE_DELAY = 1000;
        const ANIM_DURATION = 8000;
        const TAPER_START = 3200;
        const startTime = performance.now() + PRE_DELAY;
        // 모달 오픈 기준 2s/3.5s/5s 에 새싹+오버레이 동시 단계 전환
        //   t=2000: sprout 184 + overlay 185
        //   t=3500: sprout 186 + overlay 188
        //   t=5000: sprout 187 + overlay 189
        const illust = thanksModal.querySelector(".modal-water-thanks__illust");
        const illustOverlay = thanksModal.querySelector(".modal-water-thanks__illust-overlay");
        const illustTimers = [
          setTimeout(() => {
            if (illust) illust.src = "img/img_illust_184.svg";
            if (illustOverlay) {
              illustOverlay.src = "img/img_illust_185.svg";
              illustOverlay.classList.add("modal-water-thanks__illust-overlay--visible");
            }
          }, 2000),
          setTimeout(() => {
            if (illust) illust.src = "img/img_illust_186.svg";
            if (illustOverlay) illustOverlay.src = "img/img_illust_188.svg";
          }, 3500),
          setTimeout(() => {
            if (illust) illust.src = "img/img_illust_187.svg";
            if (illustOverlay) illustOverlay.src = "img/img_illust_189.svg";
          }, 5000),
        ];
        dropCycleCancels.push(() => illustTimers.forEach(clearTimeout));
        const titleEl = thanksModal.querySelector(".modal-water-thanks__title");
        const TYPE_DUR = 500;
        const titleStages = [
          { at: 0,    text: "花壇に水を届けています" },
          { at: 2667, text: "水滴がつぼみに向かっています" },
          { at: 5333, text: "花壇に変化が反映されました" },
        ];
        const setTitle = (text) => {
          if (!titleEl) return;
          titleEl.textContent = text;
          titleEl.style.animation = "none";
          void titleEl.offsetWidth;
          titleEl.style.animation = "water-thanks-typewriter " + TYPE_DUR + "ms steps(" + text.length + ") forwards";
        };
        const eraseTitle = () => {
          if (!titleEl) return;
          const len = titleEl.textContent.length || 1;
          titleEl.style.animation = "none";
          void titleEl.offsetWidth;
          titleEl.style.animation = "water-thanks-eraser " + TYPE_DUR + "ms steps(" + len + ") forwards";
        };
        const titleTimers = [];
        titleStages.forEach(({ at, text }, i) => {
          titleTimers.push(setTimeout(() => setTitle(text), at));
          if (i < titleStages.length - 1) {
            const nextAt = titleStages[i + 1].at;
            titleTimers.push(setTimeout(eraseTitle, nextAt - TYPE_DUR));
          }
        });
        dropCycleCancels.push(() => titleTimers.forEach(clearTimeout));
        // 재생 시간 종료 후 모달 자동 닫기 (마지막 drop 착지 + 1s 여유)
        const autoCloseTimer = setTimeout(() => {
          const closeBtn = thanksModal.querySelector("[data-modal-close]");
          if (closeBtn) closeBtn.click();
        }, 9000);
        dropCycleCancels.push(() => clearTimeout(autoCloseTimer));
        const activeXs = [];
        const MIN_X_DIST = 12;
        const pickGroundX = () => {
          let best = null;
          let bestMinD = -Infinity;
          for (let i = 0; i < 12; i++) {
            const x = (((Math.random() + Math.random() + Math.random()) / 3) * 100);
            const minD = activeXs.length ? Math.min.apply(null, activeXs.map((v) => Math.abs(v - x))) : Infinity;
            if (minD >= MIN_X_DIST) return x;
            if (minD > bestMinD) { best = x; bestMinD = minD; }
          }
          return best != null ? best : 50;
        };
        drops.forEach((initial) => {
          let current = initial;
          let timer = null;
          let cancelled = false;
          const isGround = initial.classList.contains("modal-water-thanks__drop--ground");
          // plant: 1s 간격으로 정확히 3번 착지 (modal+3s/4s/5s — illust swap 시점과 동기화)
          const cycleInterval = isGround ? 3000 : 1500; // plant 1.5s 간격으로 5개 (modal+2/3.5/5/6.5/8s) // plant 1.5s 간격으로 splash-pop 안전 + 균등 분배
          const groundIdx = isGround ? grounds.indexOf(initial) : -1;
          const stopTime = isGround
            ? TAPER_START + ((ANIM_DURATION - TAPER_START) * (groundIdx / Math.max(1, groundCount - 1))) + (Math.random() * 400 - 200)
            : 7000; // plant 6번째 cycle 차단 (5번째까지 허용) // plant 4번째 cycle 차단
          const playOne = (firstDelay) => {
            if (cancelled) return;
            if (performance.now() - startTime >= stopTime) return;
            const fresh = current.cloneNode(true);
            fresh.src = "img/img_water_drop_176.svg";
            fresh.classList.remove("modal-water-thanks__drop--landed");
            let chosenX = null;
            if (isGround) {
              chosenX = pickGroundX();
              fresh.style.left = chosenX.toFixed(1) + "%";
              activeXs.push(chosenX);
              const offsetY = (Math.random() * 80 - 40).toFixed(1);
              fresh.style.setProperty("--y-jitter", offsetY + "px");
            } else {
              const offsetX = (Math.random() * 80 - 40).toFixed(1);
              fresh.style.left = "calc(50% + " + offsetX + "px)";
            }
            fresh.style.animationDelay = (firstDelay || 0) + "ms";
            fresh.addEventListener("animationend", (e) => {
              if (e.animationName !== "water-drop-fall") return;
              fresh.style.animationDelay = "0ms";
              fresh.src = "img/img_water_splash.svg";
              fresh.classList.add("modal-water-thanks__drop--landed");
              // 땅이 짙어졌다 마르는 효과 — ground 케이스에만 적용 (식물 drop 은 제외)
              if (isGround) {
                const wetSpot = document.createElement("div");
                wetSpot.className = "modal-water-thanks__wet-spot modal-water-thanks__wet-spot--ground";
                wetSpot.style.left = fresh.style.left;
                wetSpot.style.setProperty("--y-jitter", fresh.style.getPropertyValue("--y-jitter"));
                fresh.parentNode.insertBefore(wetSpot, fresh); // drop/splash 보다 아래 z 로 렌더
                setTimeout(() => wetSpot.remove(), 800);
              }
              if (chosenX != null) {
                setTimeout(() => {
                  const idx = activeXs.indexOf(chosenX);
                  if (idx >= 0) activeXs.splice(idx, 1);
                }, 200);
              }
            });
            current.replaceWith(fresh);
            current = fresh;
            timer = setTimeout(() => playOne(0), (firstDelay || 0) + cycleInterval);
          };
          const initialDelay = isGround
            ? PRE_DELAY + Math.max(0, (cycleInterval / groundCount) * groundIdx + (Math.random() * 300 - 150))
            : PRE_DELAY;
          playOne(initialDelay);
          dropCycleCancels.push(() => { cancelled = true; if (timer) clearTimeout(timer); });
        });
      }


      // 「水をあげて応援する」 클릭 → 같은 backdrop 안에서 form → thanks modal 박스만 swap
      if (submit) {
        submit.addEventListener('click', () => {
          if (submit.disabled) return;
          const formModal   = backdrop.querySelector('[data-step="form"]');
          const thanksModal = backdrop.querySelector('[data-step="thanks"]');
          if (!formModal || !thanksModal) return;
          formModal.classList.add('modal--inactive');
          formModal.addEventListener('transitionend', function onClose(e) {
            if (e.propertyName !== 'opacity' && e.propertyName !== 'transform') return;
            formModal.removeEventListener('transitionend', onClose);
            startDropCycle(thanksModal);
            thanksModal.classList.remove('modal--inactive');
          });
        });
      }
    })();
  </script>

</body>
</html>
