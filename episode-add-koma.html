<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>話を追加（コマ読み） — FunFan</title>

  <!-- Design Tokens -->
  <link rel="stylesheet" href="css/tokens/typography.css">
  <link rel="stylesheet" href="css/tokens/layout.css">
  <link rel="stylesheet" href="css/tokens/color.css">

  <!-- Components -->
  <link rel="stylesheet" href="css/components/logo.css">
  <link rel="stylesheet" href="css/components/icon.css">
  <link rel="stylesheet" href="css/components/avatar.css">
  <link rel="stylesheet" href="css/components/button.css">
  <link rel="stylesheet" href="css/components/navbar.css">
  <link rel="stylesheet" href="css/components/tab.css">
  <link rel="stylesheet" href="css/components/panel-header.css">
  <link rel="stylesheet" href="css/components/menu-item.css">
  <link rel="stylesheet" href="css/components/left-panel.css">
  <link rel="stylesheet" href="css/components/msg-bubble.css">
  <link rel="stylesheet" href="css/components/chat-msg.css">
  <link rel="stylesheet" href="css/components/my-msg.css">
  <link rel="stylesheet" href="css/components/chat-input.css">
  <link rel="stylesheet" href="css/components/icon-btn.css">
  <link rel="stylesheet" href="css/components/send-btn.css">
  <link rel="stylesheet" href="css/components/right-panel.css">
  <link rel="stylesheet" href="css/components/float-btn.css">
  <link rel="stylesheet" href="css/components/badge.css">

  <!-- 페이지 전용 App Shell (v1.03까지 이 HTML <style> 블록에 있던 내용) -->
  <link rel="stylesheet" href="css/pages/app-shell.css">
  <link rel="stylesheet" href="css/components/form-field.css">
  <link rel="stylesheet" href="css/components/form-input.css">
  <link rel="stylesheet" href="css/components/form-textarea.css">
  <link rel="stylesheet" href="css/components/radio-block.css">
  <link rel="stylesheet" href="css/components/form-card.css">
  <link rel="stylesheet" href="css/components/thumbnail-upload.css">
  <link rel="stylesheet" href="css/components/page-preview-list.css">
  <link rel="stylesheet" href="css/components/page-spread-preview.css">
  <link rel="stylesheet" href="css/components/page-upload-zone.css">
  <link rel="stylesheet" href="css/components/page-spread-grid.css">
  <link rel="stylesheet" href="css/components/page-koma-grid.css">
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/pages/episode-add.css">
  <script src="js/core/_global.js" defer></script>
  <script src="js/components/chat.js" defer></script>
  <script src="js/components/modal.js" defer></script>
  <script src="js/components/modal-context.js" defer></script>
  <script src="js/components/page-attachment.js" defer></script>
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="navbar-logo">
      <i class="logo logo-funfan"></i>
    </div>
    <div class="navbar-actions">
      <div class="navbar-tabs">
        <div class="tab-group">
          <button class="tab tab--selected">公開</button>
          <button class="tab">非公開</button>
        </div>
      </div>
      <a class="btn btn-ghost" href="mypage.html">
        <i class="icon icon-account-circle"></i>
        <span class="text-assist-w4">マイページ</span>
      </a>
      <a class="btn btn-filled-nature" href="workspace.html">
        <i class="icon icon-laptop-mac"></i>
        <span class="text-assist-w4">ワークスペース</span>
      </a>
    </div>
  </header>

  <!-- App Shell -->
  <div class="workspace">

    <!-- Left Panel -->
    <div class="left-panel">

      <div class="panel-header">
        <i class="avatar avatar-01"></i>
        <div class="panel-header__body">
          <span class="panel-header__name">つちだ さん</span>
        </div>
      </div>

      <nav class="left-panel__menu">
        <button class="menu-item" onclick="location.href='workspace.html'">
          <i class="icon icon-bar-chart"></i>
          <span class="menu-item__label">トップ</span>
          <i class="icon icon-chevron-right menu-item__chevron"></i>
        </button>
        <button class="menu-item" onclick="location.href='workroom.html'">
          <i class="icon icon-edit"></i>
          <span class="menu-item__label">作業室</span>
          <i class="icon icon-chevron-right menu-item__chevron"></i>
        </button>
        <button class="menu-item menu-item--selected" onclick="location.href='series-post-management.html'">
          <i class="icon icon-folder"></i>
          <span class="menu-item__label">作品管理</span>
          <i class="icon icon-chevron-right menu-item__chevron"></i>
        </button>
        <button class="menu-item" onclick="location.href='account-setting.html'">
          <i class="icon icon-settings"></i>
          <span class="menu-item__label">アカウント設定</span>
          <i class="icon icon-chevron-right menu-item__chevron"></i>
        </button>
      </nav>

    </div>

    <!-- Main Content -->
    <div class="workspace__main">
      <div class="workspace__content">

        <header class="episode-add__page-header">
          <div class="episode-add__page-header-side episode-add__page-header-side--start">
            <a class="btn btn-line btn--sm" href="series-post-management.html">
              <i class="icon icon-chevron-left"></i>
              <span class="text-caption-w4">シリーズ管理へ戻る</span>
            </a>
          </div>
          <div class="episode-add__page-header-center">
            <h1 class="episode-add__title text-h2-w6">月の手紙</h1>
            <p class="episode-add__desc text-caption-w4">コマ読み作品のエピソードを追加します。</p>
          </div>
          <div class="episode-add__page-header-side"></div>
        </header>

        <section class="form-card episode-add__form">
          <header class="form-card__header">
            <h2 class="form-card__title text-body-md-w6">エピソード追加</h2>
          </header>

          <div class="form-card__body">

            <div class="form-card__fields">

              <!-- エピソードタイトル -->
              <div class="form-field">
                <div class="form-field__label">
                  <span class="form-field__title">エピソードタイトル</span>
                  <span class="form-field__required" aria-hidden="true"></span>
                </div>
                <div class="form-input">
                  <input class="form-input__field" type="text" placeholder="例：第一話 出発" maxlength="50" id="episode-title">
                  <span class="episode-add__input-counter text-overline-w4" data-input-counter="episode-title">0/50</span>
                </div>
              </div>

              <!-- ページ画像 -->
              <div class="form-field">
                <div class="form-field__label">
                  <span class="form-field__title">ページ画像</span>
                  <span class="form-field__required" aria-hidden="true"></span>
                </div>
                <!-- 단일 파일 input — 빈/첨부 양쪽에서 공유 -->
                <input type="file" id="page-files" accept="image/jpeg,image/png" multiple hidden>

                <!-- Empty state — 첨부 전 / 전체 삭제 후 -->
                <div class="thumbnail-upload" data-page-empty>
                  <button class="btn btn-line btn--sm" type="button" data-pick-files>
                    <i class="icon icon-folder-open"></i>
                    <span class="text-caption-w4">複数ページをアップロード</span>
                  </button>
                  <p class="thumbnail-upload__hint text-overline-w4">JPG/PNG、各2MB以下、最大100枚。</p>
                </div>

                <!-- Attached state — JS 가 동적으로 채움 (1셀=1コマ · 4-col LTR · 행 chunk) -->
                <div class="page-koma-grid" data-page-attached hidden></div>
              </div>

              <!-- あとがき -->
              <div class="form-field">
                <div class="form-field__label">
                  <span class="form-field__title">あとがき</span>
                  <span class="form-field__required" aria-hidden="true"></span>
                </div>
                <div class="form-textarea form-textarea--with-counter">
                  <textarea class="form-textarea__field" placeholder="更新コメントや読者へのひとこと" maxlength="150" rows="4" id="episode-afterword"></textarea>
                  <span class="form-textarea__counter text-overline-w4" data-textarea-counter>0/150</span>
                </div>
              </div>

            </div>

            <!-- Footer Actions -->
            <div class="form-card__actions episode-add__actions">
              <button class="btn btn-line btn--sm" type="button">
                <span class="text-caption-w4">プレビュー</span>
              </button>
              <div class="episode-add__actions-right">
                <button class="btn btn-line btn--sm" type="button">
                  <span class="text-caption-w4">下書き保存</span>
                </button>
                <button class="btn btn-filled-black btn--sm" type="button" disabled data-submit-btn>
                  <span class="text-caption-w4">投稿する</span>
                </button>
              </div>
            </div>

          </div>
        </section>

      </div>
    </div>

    <!-- Right Wrapper -->
    <div id="ws-right-wrapper" class="right-panel-wrapper">

    <button class="float-btn" id="ws-float-btn" type="button" aria-label="パネルを開く">
      <i class="icon icon-horizontal-align-right"></i>
    </button>

    <div class="right-panel">

      <div class="panel-header">
        <i class="avatar avatar-02"></i>
        <div class="panel-header__body">
          <span class="panel-header__name">はな</span>
          <div class="panel-header__meta">
            <span class="panel-header__subtext">漫画鑑定士</span>
            <a class="panel-header__link">
              設定
              <svg class="panel-header__link-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.40016 8L5.3335 4.93333L6.26683 4L10.2668 8L6.26683 12L5.3335 11.0667L8.40016 8Z" fill="var(--color-black-100)"/>
              </svg>
            </a>
          </div>
        </div>
      </div>

      <div class="right-panel__chat">

        <div class="chat-msg">
          <div class="chat-msg__header"><i class="avatar avatar-02 avatar--sm"></i></div>
          <div class="chat-msg__body"><p class="chat-msg__text">こんにちは！漫画についてなんでも聞いてください。</p></div>
        </div>

      </div>

      <div class="right-panel__footer">
        <div class="chat-input">
          <div class="chat-input__field">
            <textarea class="chat-input__textarea" aria-label="AIへのメッセージ" placeholder="はなに話しかけてみましょう..." rows="1"></textarea>
          </div>
          <div class="chat-input__actions">
            <button class="icon-btn" type="button" aria-label="作品コンテキストを追加" data-modal-open="#modal-context">
              <i class="icon icon-add"></i>
            </button>
            <button class="send-btn" type="button" aria-label="送信">
              <i class="icon icon-arrow-upward-alt"></i>
            </button>
          </div>
        </div>
        <p class="right-panel__disclaimer">AIのため、誤りを含む可能性があります</p>
      </div>

    </div>

    </div><!-- /#ws-right-wrapper -->

  </div>

  <script>
    const RESPONSES = [
      { keywords: ['つまず', '悩', '困', 'うまく', 'できない', 'むずか', '難し'], reply: 'つまずくのはむしろ成長のサインです！どんな部分で詰まっていますか？\n\nよくあるのは「頭の中のイメージと手が追いつかない」パターン。そんなときは、描きたいものを一度シンプルな図形に分解してみると突破口が見えやすいですよ。' },
      { keywords: ['練習', 'うまくなり', '上達', '描き方', 'スキル'], reply: 'おすすめの練習法は「模写→観察→オリジナル」の3ステップです。\n\n好きな作家のコマを模写→なぜそう描いているか観察→自分のキャラに応用。この繰り返しが一番早く上達できます。毎日15分でも続けることが大切です！' },
      { keywords: ['キャラ', 'キャラクター', '人物', '顔', '表情'], reply: 'キャラクターで大事なのは「シルエットで誰かわかること」です。\n\nまず全身を描く前に、シルエットだけで個性が出るか確認してみて。髪型・体型・服装の組み合わせでキャラが立ちます。表情は目の形と眉の角度の2点で印象が大きく変わりますよ。' },
      { keywords: ['構図', 'コマ', 'レイアウト', 'ページ', '配置'], reply: '構図で迷ったら「三分割法」から始めてみて。\n\nページを縦横3分割した交点にキャラや視線の focal point を置くと、自然とバランスよく見えます。コマ割りは「大→小→大」のリズムをつけると読者の目線が自然に流れます。' },
      { keywords: ['ストーリー', 'プロット', '話', 'シナリオ', 'ネーム'], reply: 'ストーリーに詰まったときは「キャラが何を欲しているか・何を恐れているか」の2点を整理してみて。\n\nその2つが噛み合うシーンがドラマの核になります。ネームは完成度より「感情の流れ」を優先して、まず粗くラフを描き切ることが大事です。' },
    ];
    const DEFAULT_REPLY = 'なるほど、それは大切なテーマですね。\n\nもう少し具体的に教えてもらえると、より的確なアドバイスができます。どんな場面で困っているか、描いているジャンルや目標なども一緒に教えてみてください！';

    function getReply(text) {
      for (const item of RESPONSES) {
        if (item.keywords.some(k => text.includes(k))) return item.reply;
      }
      return DEFAULT_REPLY;
    }

    // input counter
    document.querySelectorAll('[data-input-counter]').forEach((counter) => {
      const id = counter.getAttribute('data-input-counter');
      const input = document.getElementById(id);
      if (!input) return;
      const max = input.getAttribute('maxlength') || 50;
      const update = () => { counter.textContent = `${input.value.length}/${max}`; };
      input.addEventListener('input', update);
      update();
    });

    // textarea counter
    document.querySelectorAll('[data-textarea-counter]').forEach((counter) => {
      const ta = counter.parentElement.querySelector('.form-textarea__field');
      if (!ta) return;
      const max = ta.getAttribute('maxlength') || 150;
      const update = () => { counter.textContent = `${ta.value.length}/${max}`; };
      ta.addEventListener('input', update);
      update();
    });

    // ── 페이지 이미지 첨부 + 폼 검증 — 코마 모드는 読み始め 필드 없음(검증 3 필드) ──
    // DOMContentLoaded 대기 — defer 모듈 로드 후 init 보장
    document.addEventListener('DOMContentLoaded', () => {
      const submitBtn = document.querySelector('[data-submit-btn]');
      const titleInput = document.getElementById('episode-title');
      const afterwordInput = document.getElementById('episode-afterword');

      let fileCount = 0;
      function validateForm() {
        if (!submitBtn) return;
        const titleOk = !!titleInput?.value.trim();
        const filesOk = fileCount > 0;
        const afterOk = !!afterwordInput?.value.trim();
        submitBtn.disabled = !(titleOk && filesOk && afterOk);
      }
      titleInput?.addEventListener('input', validateForm);
      afterwordInput?.addEventListener('input', validateForm);
      submitBtn?.addEventListener('click', () => {
        if (submitBtn.disabled) return;
        window.location.href = 'series-post-management.html';
      });

      PageAttachment.init({
        emptyEl:    document.querySelector('[data-page-empty]'),
        attachedEl: document.querySelector('[data-page-attached]'),
        inputEl:    document.getElementById('page-files'),
        layout:     'koma',                      // 1셀=1이미지 · 4-col LTR (yoko 의 spread 페어링과 다름)
        maxFiles: 100,
        maxFileSizeMB: 0,                        // 프로토타이핑 — 사이즈 제한 비활성 (프로덕션 시 2)
        acceptedTypes: ['image/jpeg', 'image/png'],
        onChange: (files) => { fileCount = files.length; validateForm(); },
        onError:  ({ code, message }) => console.warn('[page-attachment]', code, message),
      });

      validateForm();
    });

    document.querySelector('.left-panel').addEventListener('wheel', (e) => e.preventDefault(), { passive: false });
    document.querySelector('.right-panel').addEventListener('wheel', (e) => e.stopPropagation(), { passive: true });

    // ── 채팅 인터랙션 ────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      Chat.setup({
        root: document.querySelector('.right-panel'),
        getReply,
      });
    });

    (() => {
      const floatBtn   = document.getElementById('ws-float-btn');
      const wrapper    = document.getElementById('ws-right-wrapper');
      const rightPanel = document.querySelector('.right-panel');
      if (!floatBtn || !wrapper || !rightPanel) return;
      const PANEL_KEY = 'rightPanelOpen';
      let isOpen = localStorage.getItem(PANEL_KEY) !== 'false';

      function applyState() {
        wrapper.classList.toggle('is-panel-closed', !isOpen);
        rightPanel.classList.toggle('right-panel--collapsed', !isOpen);
        floatBtn.classList.toggle('is-panel-closed', !isOpen);
        floatBtn.setAttribute('aria-label', isOpen ? 'パネルを閉じる' : 'パネルを開く');
      }

      wrapper.classList.add('right-panel-wrapper--instant');
      applyState();
      requestAnimationFrame(() => requestAnimationFrame(() => wrapper.classList.remove('right-panel-wrapper--instant')));

      floatBtn.addEventListener('click', () => {
        isOpen = !isOpen;
        localStorage.setItem(PANEL_KEY, isOpen);
        applyState();
      });
    })();
  </script>


</body>
</html>
