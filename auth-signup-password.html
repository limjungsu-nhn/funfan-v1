<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードを設定 — FunFan</title>

  <!-- Design Tokens -->
  <link rel="stylesheet" href="css/tokens/typography.css">
  <link rel="stylesheet" href="css/tokens/layout.css">
  <link rel="stylesheet" href="css/tokens/color.css">

  <!-- Components -->
  <link rel="stylesheet" href="css/components/logo.css">
  <link rel="stylesheet" href="css/components/icon.css">
  <link rel="stylesheet" href="css/components/navbar.css">
  <link rel="stylesheet" href="css/components/button.css">
  <link rel="stylesheet" href="css/components/form-field.css">
  <link rel="stylesheet" href="css/components/form-input.css">

  <!-- Page -->
  <link rel="stylesheet" href="css/pages/auth-signup-password.css">

  <script src="js/core/_global.js" defer></script>
</head>
<body>

  <!-- Navbar — 로고만 -->
  <header class="navbar navbar--transparent">
    <div class="navbar-logo">
      <i class="logo logo-funfan" aria-label="FunFan"></i>
    </div>
  </header>

  <main class="auth-signup-pw">
    <div class="auth-signup-pw__card">

      <!-- Header -->
      <header class="auth-signup-pw__header">
        <h1 class="auth-signup-pw__title text-h2-w6">パスワードを設定</h1>
        <p class="auth-signup-pw__subtitle text-caption-w4">招待を受けた方のみご登録いただけます。 招待メールに記載のコードをご用意ください。</p>
      </header>

      <!-- Form -->
      <form class="auth-signup-pw__form" novalidate>

        <!-- Password -->
        <div class="form-field">
          <label class="form-field__label" for="auth-signup-pw">
            <span class="form-field__title text-caption-w6">パスワード</span>
            <span class="form-field__required" aria-hidden="true"></span>
          </label>
          <div class="form-input">
            <input id="auth-signup-pw" class="form-input__field" type="password" autocomplete="new-password" placeholder="新しいパスワードを入力" required>
            <button type="button" data-role="toggle-password" data-target="auth-signup-pw" aria-label="パスワードを表示" aria-pressed="false">
              <i class="icon icon-visibility-off" aria-hidden="true"></i>
            </button>
          </div>

          <!-- Validation rules -->
          <ul class="auth-signup-pw__rules" data-role="pw-rules">
            <li class="auth-signup-pw__rule" data-rule="length">
              <i class="icon icon-check" aria-hidden="true"></i>
              <span>8文字以上</span>
            </li>
            <li class="auth-signup-pw__rule" data-rule="upper">
              <i class="icon icon-check" aria-hidden="true"></i>
              <span>英大文字を含む</span>
            </li>
            <li class="auth-signup-pw__rule" data-rule="digit">
              <i class="icon icon-check" aria-hidden="true"></i>
              <span>数字を含む</span>
            </li>
          </ul>
        </div>

        <!-- Password (confirm) -->
        <div class="form-field">
          <label class="form-field__label" for="auth-signup-pw-confirm">
            <span class="form-field__title text-caption-w6">パスワード（確認）</span>
            <span class="form-field__required" aria-hidden="true"></span>
          </label>
          <div class="form-input" data-role="confirm-wrap">
            <input id="auth-signup-pw-confirm" class="form-input__field" type="password" autocomplete="new-password" placeholder="もう一度に入力してください" required>
            <button type="button" data-role="toggle-password" data-target="auth-signup-pw-confirm" aria-label="パスワードを表示" aria-pressed="false">
              <i class="icon icon-visibility-off" aria-hidden="true"></i>
            </button>
          </div>
          <p class="form-field__caution" data-role="confirm-caution" hidden>パスワードが一致しません</p>
        </div>

      </form>

      <!-- Actions -->
      <div class="auth-signup-pw__actions">
        <button type="submit" class="btn btn-filled-black" data-role="submit">
          <span class="text-assist-w4">登録する</span>
        </button>
      </div>

    </div>
  </main>

  <script>
    // 비밀번호 표시/숨김 토글 (두 개 입력에 모두 적용)
    document.querySelectorAll('[data-role="toggle-password"]').forEach((toggle) => {
      const input = document.getElementById(toggle.dataset.target);
      if (!input) return;
      toggle.addEventListener('click', () => {
        const showing = input.type === 'text';
        input.type = showing ? 'password' : 'text';
        toggle.setAttribute('aria-pressed', String(!showing));
        toggle.setAttribute('aria-label', showing ? 'パスワードを表示' : 'パスワードを非表示');
        const icon = toggle.querySelector('.icon');
        icon.classList.toggle('icon-visibility-off', showing);
        icon.classList.toggle('icon-visibility', !showing);
      });
    });

    // 비밀번호 검증 + 등록 버튼 enable/disable
    (() => {
      const pw = document.getElementById('auth-signup-pw');
      const confirm = document.getElementById('auth-signup-pw-confirm');
      const submit = document.querySelector('[data-role="submit"]');
      const rules = {
        length: document.querySelector('[data-rule="length"]'),
        upper:  document.querySelector('[data-rule="upper"]'),
        digit:  document.querySelector('[data-rule="digit"]'),
      };

      const confirmWrap = document.querySelector('[data-role="confirm-wrap"]');
      const confirmCaution = document.querySelector('[data-role="confirm-caution"]');

      function check() {
        const v = pw.value;
        const ok = {
          length: v.length >= 8,
          upper:  /[A-Z]/.test(v),
          digit:  /[0-9]/.test(v),
        };
        for (const k in ok) rules[k].classList.toggle('is-valid', ok[k]);

        // 두번째 입력에 값이 있고 일치하지 않으면 caution 표시
        const mismatch = confirm.value.length > 0 && v !== confirm.value;
        confirmWrap.classList.toggle('form-input--error', mismatch);
        confirmCaution.hidden = !mismatch;
      }

      pw.addEventListener('input', check);
      confirm.addEventListener('input', check);

      submit.addEventListener('click', (e) => {
        e.preventDefault();
        const v = pw.value;
        const allValid = v.length >= 8 && /[A-Z]/.test(v) && /[0-9]/.test(v);
        const matches = v.length > 0 && v === confirm.value;
        if (!matches) {
          confirmWrap.classList.add('form-input--error');
          confirmCaution.hidden = false;
          confirm.focus();
          return;
        }
        if (allValid) location.href = 'creative-partner-onboarding-01.html';
      });
    })();
  </script>

</body>
</html>
