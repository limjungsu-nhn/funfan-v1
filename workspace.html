<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace — FunFan</title>

  <!-- Design Tokens -->
  <link rel="stylesheet" href="typography.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="color.css">

  <!-- Components -->
  <link rel="stylesheet" href="icon.css">
  <link rel="stylesheet" href="avatar.css">
  <link rel="stylesheet" href="button.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="panel-header.css">
  <link rel="stylesheet" href="menu-item.css">
  <link rel="stylesheet" href="left-panel.css">
  <link rel="stylesheet" href="msg-bubble.css">
  <link rel="stylesheet" href="chat-msg.css">
  <link rel="stylesheet" href="my-msg.css">
  <link rel="stylesheet" href="chat-input.css">
  <link rel="stylesheet" href="icon-btn.css">
  <link rel="stylesheet" href="send-btn.css">
  <link rel="stylesheet" href="right-panel.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --navbar-height: 64px; /* 네비게이션 높이 — 여기만 수정하면 전체 자동 반영 */
    }

    html, body {
      margin: 0;
      padding: 0;
      min-width: 1440px;
      height: 100%;
      overscroll-behavior: none; /* 페이지 레벨 스크롤 차단 — overflow:hidden 없이 box-shadow 클리핑 방지 */
      background: var(--color-gray-6);
      font-family: var(--font-family-base);
    }

    /* ---------- App Shell ---------- */
    .workspace {
      display: flex;
      height: 100%;
    }

    /* left-panel: 화면 최상단부터 시작, 내부 콘텐츠만 navbar 아래로 밀어냄 */
    .workspace .left-panel {
      padding-top: var(--navbar-height);
      flex-shrink: 0;
      position: relative;
      z-index: 10; /* navbar(100) 아래, 일반 콘텐츠 위 */
    }

    /* right-panel: left-panel과 동일 조건 */
    .workspace .right-panel {
      padding-top: var(--navbar-height);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    /* ---------- Right Area ---------- */
    .workspace__main {
      flex: 1;
      overflow: auto;
      padding-top: var(--navbar-height);
      background: var(--color-white-50);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <!-- Logo -->
    <div class="navbar-logo">
      <svg style="position:absolute;left:2.50px;top:4.50px" width="11" height="21" viewBox="0 0 11 21" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 20.5435V0H10.9293V3.42391H3.96185V6.71087H10.2462V10.1348H3.96185V20.5435H0Z" fill="black"/></svg>
      <svg style="position:absolute;left:14.77px;top:11.35px" width="14" height="15" viewBox="0 0 14 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.55571 14.1522C4.5994 14.1522 3.69621 13.9239 2.84616 13.4674C1.99611 12.9957 1.30544 12.3185 0.774156 11.4359C0.258052 10.538 0 9.45761 0 8.19457V0H3.96186V7.66957C3.96186 8.43044 4.18955 9.10761 4.64493 9.70109C5.1155 10.2946 5.76822 10.5913 6.60309 10.5913C7.28617 10.5913 7.89335 10.3478 8.42463 9.86087C8.9711 9.3587 9.24433 8.64348 9.24433 7.71522V0H13.2062V13.6957H9.60864V12.2576C9.12289 12.8663 8.5233 13.338 7.80986 13.6728C7.11161 13.9924 6.36022 14.1522 5.55571 14.1522Z" fill="black"/></svg>
      <svg style="position:absolute;left:30.99px;top:10.89px" width="14" height="15" viewBox="0 0 14 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 14.1522V0.456521H3.55201V1.96304C4.03775 1.32391 4.63734 0.836957 5.35078 0.502174C6.06422 0.167392 6.83078 0 7.65048 0C8.62197 0 9.52515 0.235869 10.36 0.707608C11.2101 1.16413 11.8932 1.8413 12.4093 2.73913C12.9405 3.62174 13.2062 4.69456 13.2062 5.95761V14.1522H9.24433V6.48261C9.24433 5.72174 9.01663 5.04457 8.56125 4.45109C8.10586 3.85761 7.45314 3.56087 6.60309 3.56087C5.92001 3.56087 5.30524 3.79674 4.75878 4.26848C4.2275 4.725 3.96185 5.44782 3.96185 6.43696V14.1522H0Z" fill="black"/></svg>
      <svg style="position:absolute;left:47.62px;top:4.50px" width="11" height="21" viewBox="0 0 11 21" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 20.5435V0H10.9293V3.42391H3.96185V6.71087H10.2462V10.1348H3.96185V20.5435H0Z" fill="black"/></svg>
      <svg style="position:absolute;left:58.77px;top:10.98px" width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.83078 14.4261C5.57088 14.4261 4.42483 14.0989 3.39262 13.4446C2.36041 12.7902 1.53313 11.9228 0.910771 10.8424C0.30359 9.74674 0 8.53696 0 7.21304C0 5.88913 0.30359 4.67935 0.910771 3.5837C1.53313 2.48804 2.36041 1.62065 3.39262 0.981521C4.42483 0.327173 5.57088 0 6.83078 0C7.7112 0 8.51571 0.159783 9.24433 0.479348C9.97295 0.783696 10.5953 1.20978 11.1114 1.75761V0.365217H14.5268V14.0609H11.1114V12.6685C10.5953 13.2163 9.97295 13.65 9.24433 13.9696C8.51571 14.2739 7.7112 14.4261 6.83078 14.4261ZM7.30894 10.9337C7.97684 10.9337 8.58402 10.7663 9.13048 10.4315C9.67695 10.0967 10.1096 9.64782 10.4283 9.08478C10.7623 8.52174 10.9293 7.89783 10.9293 7.21304C10.9293 6.52826 10.7623 5.90435 10.4283 5.3413C10.1096 4.77826 9.67695 4.32935 9.13048 3.99457C8.58402 3.65978 7.97684 3.49239 7.30894 3.49239C6.64104 3.49239 6.03386 3.65978 5.4874 3.99457C4.94094 4.32935 4.50073 4.77826 4.16678 5.3413C3.84801 5.90435 3.68862 6.52826 3.68862 7.21304C3.68862 7.89783 3.84801 8.52174 4.16678 9.08478C4.50073 9.64782 4.94094 10.0967 5.4874 10.4315C6.03386 10.7663 6.64104 10.9337 7.30894 10.9337Z" fill="black"/></svg>
      <svg style="position:absolute;left:76.29px;top:10.89px" width="14" height="15" viewBox="0 0 14 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 14.1522V0.456521H3.55201V1.96304C4.03775 1.32391 4.63734 0.836957 5.35078 0.502174C6.06422 0.167392 6.83079 0 7.65048 0C8.62197 0 9.52515 0.235869 10.36 0.707608C11.2101 1.16413 11.8932 1.8413 12.4093 2.73913C12.9405 3.62174 13.2062 4.69456 13.2062 5.95761V14.1522H9.24433V6.48261C9.24433 5.72174 9.01664 5.04457 8.56125 4.45109C8.10587 3.85761 7.45314 3.56087 6.60309 3.56087C5.92001 3.56087 5.30524 3.79674 4.75878 4.26848C4.2275 4.725 3.96185 5.44782 3.96185 6.43696V14.1522H0Z" fill="black"/></svg>
    </div>

    <!-- Actions -->
    <div class="navbar-actions">
      <button class="btn btn-ghost">
        <i class="icon icon-account-circle"></i>
        <span class="text-assist-w5">マイページ</span>
      </button>
      <button class="btn btn-filled">
        <i class="icon icon-laptop-mac"></i>
        <span class="text-assist-w5">ワークスペース</span>
      </button>
    </div>
  </header>

  <!-- App Shell -->
  <div class="workspace">

    <!-- Left Panel (fixed 288px = 1440 × 20%) -->
    <div class="left-panel">

      <!-- Panel Header — styleguide.html Case 1 -->
      <div class="panel-header">
        <i class="avatar avatar-01"></i>
        <div class="panel-header__body">
          <span class="panel-header__name">Name</span>
        </div>
      </div>

      <!-- Menu List -->
      <nav class="left-panel__menu">
        <button class="menu-item menu-item--selected">
          <i class="icon icon-bar-chart"></i>
          <span class="menu-item__label">トップ</span>
          <i class="icon icon-chevron-right menu-item__chevron"></i>
        </button>
        <button class="menu-item">
          <i class="icon icon-edit"></i>
          <span class="menu-item__label">作業室</span>
          <i class="icon icon-chevron-right menu-item__chevron"></i>
        </button>
        <button class="menu-item">
          <i class="icon icon-folder"></i>
          <span class="menu-item__label">作品管理</span>
          <i class="icon icon-chevron-right menu-item__chevron"></i>
        </button>
        <button class="menu-item">
          <i class="icon icon-settings"></i>
          <span class="menu-item__label">アカウント設定</span>
          <i class="icon icon-chevron-right menu-item__chevron"></i>
        </button>
      </nav>

    </div>

    <!-- Main Content -->
    <div class="workspace__main"></div>

    <!-- Right Panel (fixed 288px = 1440 × 20%) -->
    <div class="right-panel">

      <!-- Header -->
      <div class="right-panel__header">
        <i class="avatar avatar-01 avatar--md"></i>
        <div class="right-panel__header-info">
          <p class="right-panel__name">はな</p>
          <div class="right-panel__meta">
            <p class="right-panel__subtitle">漫画鑑定士</p>
            <div class="right-panel__settings-link">
              <span>設定</span>
              <i class="icon icon-chevron-right"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Chat Area -->
      <div class="right-panel__chat">

        <div class="chat-msg">
          <div class="chat-msg__header">
            <i class="avatar avatar-01 avatar--sm"></i>
          </div>
          <div class="chat-msg__body">
            <p class="chat-msg__text">こんにちは！漫画についてなんでも聞いてください。</p>
          </div>
        </div>

        <div class="my-msg">
          <div class="my-msg__bubble">
            <p class="my-msg__text">最近描いててつまずいてることがあります</p>
            <svg class="my-msg__tail" width="16" height="11" viewBox="0 0 16 11" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 0H12L15.111 9.33315C15.4129 10.2387 14.4188 11.027 13.6059 10.5267C10.9214 8.87468 7.83106 8 4.67894 8H0V0Z"/>
            </svg>
          </div>
        </div>

        <div class="chat-msg">
          <div class="chat-msg__header">
            <i class="avatar avatar-01 avatar--sm"></i>
          </div>
          <div class="chat-msg__body">
            <p class="chat-msg__text">どんなことでつまずいていますか？詳しく教えてください！</p>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="right-panel__footer">
        <div class="right-panel__suggestions">
          <button class="msg-bubble" type="button"><span class="text-caption-w3">最近描いててつまずいてることがある</span></button>
          <button class="msg-bubble" type="button"><span class="text-caption-w3">おすすめの練習方法を教えて</span></button>
          <button class="msg-bubble" type="button"><span class="text-caption-w3">キャラクターの描き方のコツは？</span></button>
        </div>
        <div class="chat-input">
          <div class="chat-input__field">
            <textarea class="chat-input__textarea" placeholder="はなに話しかけてみましょう..." rows="1"></textarea>
          </div>
          <div class="chat-input__actions">
            <button class="icon-btn" type="button" aria-label="添付">
              <i class="icon icon-add"></i>
            </button>
            <button class="send-btn" type="button" aria-label="送信">
              <i class="icon icon-arrow-upward-alt"></i>
            </button>
          </div>
        </div>
        <p class="right-panel__disclaimer">AIのため、誤りを含む可能性があります</p>
      </div>

    </div>

  </div>

  <script>
    // Left Panel — 마우스 스크롤 차단 (overflow 없이 포커스 링 보존)
    document.querySelector('.left-panel').addEventListener('wheel', (e) => {
      e.preventDefault();
    }, { passive: false });

    // Right Panel chat area — 스크롤 허용, 패널 자체 스크롤 차단
    document.querySelector('.right-panel').addEventListener('wheel', (e) => {
      e.stopPropagation();
    }, { passive: true });

    // Right Panel — 입력창 & 전송 버튼 인터랙션
    (() => {
      const textarea = document.querySelector('.right-panel .chat-input__textarea');
      const sendBtn  = document.querySelector('.right-panel .send-btn');
      const chatArea = document.querySelector('.right-panel__chat');

      if (!textarea || !sendBtn || !chatArea) return;

      // textarea 자동 높이 조절 (최대 4줄)
      textarea.addEventListener('input', () => {
        textarea.style.height = '20px';
        textarea.style.height = Math.min(textarea.scrollHeight, 80) + 'px';
      });

      // 전송 처리
      function sendMessage() {
        const text = textarea.value.trim();
        if (!text) return;

        // 나의 메시지 추가
        const msg = document.createElement('div');
        msg.className = 'my-msg';
        msg.innerHTML =
          '<div class="my-msg__bubble">' +
            '<p class="my-msg__text">' + text.replace(/</g, '&lt;') + '</p>' +
            '<svg class="my-msg__tail" width="16" height="11" viewBox="0 0 16 11" xmlns="http://www.w3.org/2000/svg">' +
              '<path d="M0 0H12L15.111 9.33315C15.4129 10.2387 14.4188 11.027 13.6059 10.5267C10.9214 8.87468 7.83106 8 4.67894 8H0V0Z"/>' +
            '</svg>' +
          '</div>';
        chatArea.appendChild(msg);
        chatArea.scrollTop = chatArea.scrollHeight;

        // 입력 초기화
        textarea.value = '';
        textarea.style.height = '20px';
        textarea.focus();
      }

      sendBtn.addEventListener('click', sendMessage);
      textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // 칩 클릭 → 입력창에 텍스트 삽입
      document.querySelectorAll('.right-panel__suggestions .msg-bubble').forEach((chip) => {
        chip.addEventListener('click', () => {
          textarea.value = chip.textContent;
          textarea.dispatchEvent(new Event('input'));
          textarea.focus();
        });
      });
    })();
  </script>

</body>
</html>
