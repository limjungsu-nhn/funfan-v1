<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Partner Onboarding — Step 5 — FunFan</title>

  <!-- Design Tokens -->
  <link rel="stylesheet" href="css/tokens/typography.css">
  <link rel="stylesheet" href="css/tokens/layout.css">
  <link rel="stylesheet" href="css/tokens/color.css">

  <!-- Components -->
  <link rel="stylesheet" href="css/components/logo.css">
  <link rel="stylesheet" href="css/components/icon.css">
  <link rel="stylesheet" href="css/components/navbar.css">
  <link rel="stylesheet" href="css/components/button.css">
  <link rel="stylesheet" href="css/components/radio-list.css">

  <!-- App Shell + Page -->
  <link rel="stylesheet" href="css/pages/app-shell.css">
  <link rel="stylesheet" href="css/pages/creative-partner-onboarding.css">

  <script src="js/core/keyboard-focus.js" defer></script>
</head>
<body>

  <!-- Top progress bar — 100% (1920px) -->
  <div class="creative-partner-onboarding__progress creative-partner-onboarding__progress--step4" aria-hidden="true"></div>

  <!-- Navbar — Transparent (로고만) -->
  <header class="navbar navbar--transparent">
    <div class="navbar-logo">
      <i class="logo logo-funfan"></i>
    </div>
  </header>

  <!-- Main -->
  <main class="creative-partner-onboarding creative-partner-onboarding--top">
    <section class="creative-partner-onboarding__step2">

      <!-- Header -->
      <header class="creative-partner-onboarding__step2-header">
        <h1 class="creative-partner-onboarding__step2-title text-h1-w6">直近の目標を教えてください</h1>
        <p class="creative-partner-onboarding__step2-desc text-assist-w4">今どこに向かっていますか？</p>
      </header>

      <!-- Form (single-column radio list) -->
      <form class="creative-partner-onboarding__step3-form" novalidate>
        <label class="radio-list">
          <input type="radio" class="radio-list__input" name="cp-goal" value="commercial">
          <span class="radio-list__text">商業デビュー(出版社・賞への投稿)</span>
          <i class="icon icon-check radio-list__check" aria-hidden="true"></i>
        </label>
        <label class="radio-list">
          <input type="radio" class="radio-list__input" name="cp-goal" value="contest">
          <span class="radio-list__text">コンテスト・賞への応募</span>
          <i class="icon icon-check radio-list__check" aria-hidden="true"></i>
        </label>
        <label class="radio-list">
          <input type="radio" class="radio-list__input" name="cp-goal" value="webcomic">
          <span class="radio-list__text">webコミック投稿・連載開始</span>
          <i class="icon icon-check radio-list__check" aria-hidden="true"></i>
        </label>
        <label class="radio-list">
          <input type="radio" class="radio-list__input" name="cp-goal" value="sns">
          <span class="radio-list__text">SNS発信・フォロワー目標</span>
          <i class="icon icon-check radio-list__check" aria-hidden="true"></i>
        </label>
        <label class="radio-list">
          <input type="radio" class="radio-list__input" name="cp-goal" value="finish">
          <span class="radio-list__text">まずは1作完成させる</span>
          <i class="icon icon-check radio-list__check" aria-hidden="true"></i>
        </label>
        <label class="radio-list">
          <input type="radio" class="radio-list__input" name="cp-goal" value="undecided">
          <span class="radio-list__text">まだ決まってない</span>
          <i class="icon icon-check radio-list__check" aria-hidden="true"></i>
        </label>
      </form>

      <!-- Actions -->
      <div class="creative-partner-onboarding__step2-actions">
        <a class="btn btn-line btn--lg" href="creative-partner-onboarding-04.html">
          <span class="text-assist-w4">戻る</span>
        </a>
        <button type="button" class="btn btn-filled-black btn--lg" data-role="next" disabled>
          <span class="text-assist-w4">次へ</span>
        </button>
      </div>

    </section>
  </main>

  <script>
    (() => {
      const next = document.querySelector('[data-role="next"]');
      const radios = document.querySelectorAll('input[name="cp-goal"]');
      radios.forEach((r) => r.addEventListener('change', () => {
        next.disabled = !Array.from(radios).some((x) => x.checked);
      }));
      next.addEventListener('click', () => {
        if (!next.disabled) location.href = 'creative-partner-onboarding-06.html';
      });
    })();
  </script>

</body>
</html>
