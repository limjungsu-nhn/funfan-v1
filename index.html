<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FunFan — Index</title>

  <!-- Design Tokens -->
  <link rel="stylesheet" href="css/tokens/typography.css">
  <link rel="stylesheet" href="css/tokens/layout.css">
  <link rel="stylesheet" href="css/tokens/color.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--color-gray-6);
      font-family: var(--font-family-base);
    }

    .index {
      max-width: var(--p40);
      margin: 0 auto;
      padding: var(--p5) var(--p3);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .index__title {
      margin: 0;
      font-size: var(--font-size-h2);
      line-height: var(--line-height-h2);
      font-weight: var(--font-weight-w6);
      color: var(--color-black-100);
    }

    .index__list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .index__link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: 8px;
      background: var(--color-white-100);
      color: var(--color-black-100);
      text-decoration: none;
      font-size: var(--font-size-body-md);
      line-height: var(--line-height-body-md);
      font-weight: var(--font-weight-w4);
      border: 1px solid var(--color-gray-5);
      transition: background 0.2s, border-color 0.2s;
    }

    .index__link:hover {
      background: var(--color-gray-6);
      border-color: var(--color-gray-4);
    }

    .index__status {
      flex-shrink: 0;
      font-size: var(--font-size-caption);
      line-height: var(--line-height-caption);
      color: var(--color-font-secondary);
    }
  </style>
  <script src="js/core/keyboard-focus.js" defer></script>
</head>
<body>

  <main class="index">
    <h1 class="index__title">FunFan v1.03</h1>
    <ul class="index__list">
      <li><a class="index__link" href="styleguide.html" target="_blank" rel="noopener noreferrer"><span>styleguide.html</span><span class="index__status" aria-label="업데이트">🔄</span></a></li>
      <li><a class="index__link" href="workspace-onboarding.html" target="_blank" rel="noopener noreferrer"><span>workspace-onboarding.html</span><span class="index__status" aria-label="완료">✅</span></a></li>
      <li><a class="index__link" href="workspace.html" target="_blank" rel="noopener noreferrer"><span>workspace.html</span><span class="index__status" aria-label="완료">✅</span></a></li>
      <li><a class="index__link" href="workroom.html" target="_blank" rel="noopener noreferrer"><span>workroom.html</span><span class="index__status" aria-label="완료">✅</span></a></li>
      <li><a class="index__link" href="series-home.html" target="_blank" rel="noopener noreferrer"><span>series-home.html</span><span class="index__status" aria-label="완료">✅</span></a></li>
      <li><a class="index__link" href="series-post-management.html" target="_blank" rel="noopener noreferrer"><span>series-post-management.html</span><span class="index__status" aria-label="진행중">⏳</span></a></li>
      <li><a class="index__link" href="account-setting.html" target="_blank" rel="noopener noreferrer"><span>account-setting.html</span><span class="index__status" aria-label="진행중">⏳</span></a></li>
    </ul>
  </main>

</body>
</html>
